<!DOCTYPE html>
<html>
<head>
  <title>Add Wallet</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<div class="top-bar">
  <span onclick="history.back()">←</span>
  <h3 style="text-align:center;">virtual currency</h3>
</div>

<!-- Wallet name -->
<div class="section row">
  <span>Wallet name</span>
  <input id="walletName" placeholder="Please enter the wallet name" autocomplete="off">
</div>

<!-- Protocol -->
<div class="section row" onclick="openProtocol()">
  <span>Virtual Currency Protocol</span>
  <span id="protocolText" class="right-text">Please select</span>
</div>

<!-- Address -->
<div class="section row">
  <span>Wallet address</span>
  <input id="walletAddress" placeholder="Please enter the e-wallet address" autocomplete="off">
</div>

<!-- Names -->
<div class="section row">
  <span>Names</span>
  <input id="names" placeholder="Names" autocomplete="off">
</div>

<!-- Password -->
<div class="section row">
  <span>Withdrawal Password</span>
  <div class="password-box">
    <input id="withdrawPass" type="password" placeholder="Enter password">
    <span class="eye" onclick="togglePassword()">👁️</span>
  </div>
</div>

<!-- Buttons -->
<div class="bottom-btn">
  <button id="okBtn" disabled onclick="saveWallet()">OK</button>
  <button class="cancel-btn" onclick="history.back()">Cancel</button>
</div>

<!-- ✅ Protocol Popup -->
<div id="protocolBox" class="popup">
  <p>Virtual Currency Protocol</p>
  <div class="option" onclick="selectProtocol()">TRC-20</div>
  <button class="cancel-btn" onclick="closeProtocol()">Cancel</button>
</div>

<script>
let selectedProtocol = "";

function openProtocol() {
  document.getElementById("protocolBox").style.display = "block";
}

function closeProtocol() {
  document.getElementById("protocolBox").style.display = "none";
}

function selectProtocol() {
  selectedProtocol = "TRC-20";
  document.getElementById("protocolText").innerText = "TRC-20";
  closeProtocol();
  checkForm();
}

function togglePassword() {
  const input = document.getElementById("withdrawPass");

  if (input.type === "password") {
    input.type = "text";
  } else {
    input.type = "password";
  }
}

function checkForm() {
  const name = document.getElementById("walletName").value;
  const address = document.getElementById("walletAddress").value;
  const names = document.getElementById("names").value;
  const pass = document.getElementById("withdrawPass").value;

  const btn = document.getElementById("okBtn");

  if (name && address && names && pass && selectedProtocol) {
    btn.disabled = false;
    btn.classList.add("active");
  } else {
    btn.disabled = true;
    btn.classList.remove("active");
  }
}

document.querySelectorAll("input").forEach(i=>{
  i.addEventListener("input", checkForm);
});

function saveWallet() {
  const data = {
    name: document.getElementById("walletName").value,
    address: document.getElementById("walletAddress").value,
    names: document.getElementById("names").value,
    protocol: selectedProtocol,
    password: document.getElementById("withdrawPass").value
  };

  localStorage.setItem("userWallet", JSON.stringify(data));

  alert("Saved!");
  window.location.href = "withdraw.html";
}
</script>

</body>
</html>
