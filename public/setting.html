<!DOCTYPE html>
<html>
<head>
  <title>Setting</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#111517;
      color:white;
    }

    .header{
      text-align:center;
      padding:15px;
      font-size:28px;
      font-weight:bold;
      position:relative;
      border-bottom:1px solid #2a2a2a;
    }

    .back{
      position:absolute;
      left:15px;
      top:15px;
      font-size:28px;
      cursor:pointer;
    }

    .menu-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 18px;
      border-bottom:1px solid #2a2a2a;
      font-size:18px;
      cursor:pointer;
    }

    .arrow{
      color:#c89b6d;
      font-size:22px;
    }

    .logout{
      text-align:center;
      color:red;
      margin-top:40px;
      font-size:20px;
      cursor:pointer;
    }

    .language-select{
      background:#1b1f22;
      color:white;
      border:1px solid #444;
      padding:8px;
      border-radius:6px;
      font-size:16px;
      margin-top:10px;
      display:none;
      width:90%;
      margin-left:auto;
      margin-right:auto;
    }
  </style>
</head>
<body>

<div class="header">
  <span class="back" onclick="history.back()">&#8592;</span>
  Setting
</div>

<div class="menu-item" onclick="toggleLanguage()">
  <span id="langText">Language settings</span>
  <span class="arrow">›</span>
</div>

<select id="languageSelect" class="language-select" onchange="changeLanguage()">
  <option value="en">English</option>
  <option value="bn">বাংলা</option>
</select>

<div class="logout" onclick="logout()">
  Logout
</div>

<script>
function toggleLanguage(){
  const select = document.getElementById("languageSelect");
  select.style.display = select.style.display === "block" ? "none" : "block";
}

function changeLanguage(){
  const lang = document.getElementById("languageSelect").value;

  localStorage.setItem("siteLanguage", lang);

  if(lang === "bn"){
    document.getElementById("langText").innerText = "ভাষা পরিবর্তন";
    document.querySelector(".logout").innerText = "লগআউট";
  }else{
    document.getElementById("langText").innerText = "Language settings";
    document.querySelector(".logout").innerText = "Logout";
  }
}

function logout(){
  localStorage.removeItem("token");
  localStorage.removeItem("username");
  window.location.href = "login.html";
}

window.onload = function(){
  const savedLang = localStorage.getItem("siteLanguage") || "en";
  document.getElementById("languageSelect").value = savedLang;

  if(savedLang === "bn"){
    document.getElementById("langText").innerText = "ভাষা পরিবর্তন";
    document.querySelector(".logout").innerText = "লগআউট";
  }
}
</script>

</body>
</html>
