<!DOCTYPE html>
<html>
<head>
  <title>Withdrawal</title>
  <style>
    body{
      margin:0;
      background:#111517;
      color:white;
      font-family:Arial, sans-serif;
    }

    .header{
      text-align:center;
      padding:15px;
      font-size:28px;
      font-weight:bold;
      position:relative;
      background:#111517;
    }

    .back{
      position:absolute;
      left:15px;
      top:15px;
      font-size:28px;
      cursor:pointer;
    }

    .wallet-box{
      padding:15px;
    }

    .wallet-card{
      width:80px;
      text-align:center;
      border:1px solid #555;
      border-radius:5px;
      padding:10px;
      font-size:14px;
      margin-bottom:20px;
    }

    .section-title{
      margin:20px 0 10px;
      font-size:16px;
      font-weight:bold;
    }

    .wallet-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 0;
      border-top:1px solid #333;
      border-bottom:1px solid #333;
      color:#ccc;
      font-size:16px;
    }

    .amount-box{
      margin-top:20px;
      border-bottom:1px solid #333;
      padding-bottom:10px;
    }

    .amount-box label{
      display:block;
      margin-bottom:10px;
      color:#ccc;
    }

    .amount-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .amount-row input{
      flex:1;
      margin:0 15px;
      background:none;
      border:none;
      border-bottom:1px solid #444;
      color:white;
      font-size:22px;
      outline:none;
    }

    .max{
      color:#aaa;
      font-size:14px;
    }

    .ok-btn{
      margin:30px 15px;
      width:calc(100% - 30px);
      padding:15px;
      border:none;
      border-radius:4px;
      background:#555;
      color:#aaa;
      font-size:20px;
      cursor:pointer;
    }

    .ok-btn.active{
      background:#6e3b3b;
      color:white;
    }
  </style>
</head>
<body>

<div class="header">
  <span class="back" onclick="history.back()">&#8592;</span>
  Withdrawal
</div>

<div class="wallet-box">

  <div class="wallet-card">
    💎<br>virtual<br>currency
  </div>

  <div class="section-title">Wallet</div>

  <div class="wallet-row">
    <span id="walletName">No wallet added</span>
    <span style="color:red;">✔</span>
  </div>

  <div class="amount-box">
    <label>USDT</label>
    <div class="amount-row">
      <input type="number" id="amount" placeholder="">
      <span class="max">Minimum 10</span>
    </div>
  </div>

  <button id="okBtn" class="ok-btn" disabled>OK</button>
</div>

<script>
const amountInput = document.getElementById("amount");
const okBtn = document.getElementById("okBtn");

let user = localStorage.getItem("username");
let walletData = JSON.parse(localStorage.getItem("walletData_" + user));

if(walletData){
  document.getElementById("walletName").innerText =
    walletData.name + "(" + walletData.protocol + ")";
}

amountInput.addEventListener("input", () => {
  let amount = parseFloat(amountInput.value) || 0;

  if (amount >= 10) {
    okBtn.disabled = false;
    okBtn.classList.add("active");
  } else {
    okBtn.disabled = true;
    okBtn.classList.remove("active");
  }
});

okBtn.addEventListener("click", async () => {
  let amount = parseFloat(amountInput.value);

  if (!walletData) {
    alert("Please add wallet first");
    return;
  }

  if (amount < 10) {
    alert("Minimum withdrawal is 10 USDT");
    return;
  }

  okBtn.disabled = true;
  okBtn.innerText = "Processing...";

  const token = localStorage.getItem("token");

  try {
    const res = await fetch("/withdraw", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ amount })
    });

    const result = await res.json();

    if (result.success) {
      alert("Withdrawal request submitted");
      window.location.href = "mine.html";
    } else {
      alert(result.msg || "Withdrawal failed");
      okBtn.disabled = false;
      okBtn.innerText = "OK";
    }

  } catch (err) {
    alert("Server error");
    okBtn.disabled = false;
    okBtn.innerText = "OK";
  }
});
</script>

</body>
</html>
