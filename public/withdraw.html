<!DOCTYPE html>
<html>
<head>
  <title>Withdrawal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="withdraw.css">
  <link rel="icon" type="image/png" href="logo.png">
</head>

<body>

<div class="withdraw-page">

  <div class="withdraw-header">
    <span class="back" onclick="history.back()">❮</span>
    <h2>Withdrawal</h2>
  </div>

  <div class="withdraw-container">

    <div class="currency-box">
      💳
      <p>virtual<br>currency</p>
    </div>

    <div class="section-title">Wallet</div>

    <div class="wallet-row">
      <span id="walletName">No wallet added</span>
      <span class="check">✔</span>
    </div>

    <div class="amount-box">
      <div class="amount-header">
        <span>USDT</span>
        <span class="max">Maximum amount</span>
      </div>

      <input type="number" id="amount" placeholder="">

    </div>

    <button id="okBtn" class="ok-btn" disabled>OK</button>

  </div>
</div>

<div class="custom-alert-inside-withdraw" id="customAlert"></div>

<script>
const amountInput = document.getElementById("amount");
const okBtn = document.getElementById("okBtn");

const token = localStorage.getItem("token");

function showMessage(text) {

  const alertBox = document.getElementById("customAlert");

  alertBox.innerText = text;

  alertBox.style.display = "block";

  setTimeout(() => {
    alertBox.style.display = "none";
  }, 3000);

}

async function loadWallet() {

  if (sessionStorage.getItem("withdrawAccess") !== "true") {

    showMessage("Access denied");

    window.location.href = "mine.html";

    return;
  }

  try {

    const res = await fetch("/get-wallet", {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    const data = await res.json();

    if (
      !data.success ||
      !data.wallet ||
      !data.wallet.locked
    ) {

      showMessage("Please add wallet first");

      window.location.href = "wallet.html";

      return;
    }

    window.walletData = data.wallet;

    document.getElementById("walletName").innerText =
      data.wallet.name + " (" + data.wallet.protocol + ")";

  } catch (err) {

    showMessage("Server error");
  }
}

loadWallet();

amountInput.addEventListener("input", () => {
  let amount = parseFloat(amountInput.value) || 0;

  if (amount >= 10) {
    okBtn.disabled = false;
    okBtn.classList.add("active");
  } else {
    okBtn.disabled = true;
    okBtn.classList.remove("active");
  }
});

okBtn.addEventListener("click", async () => {
  let amount = parseFloat(amountInput.value);

  if (!window.walletData) {
    showMessage("Please add wallet first");
    return;
  }

  if (amount < 10) {
    showMessage("Minimum withdrawal is 10 USDT");
    return;
  }

  okBtn.disabled = true;
  okBtn.innerText = "Processing...";

  const token = localStorage.getItem("token");

  try {
    const res = await fetch("/withdraw", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ amount })
    });

    const result = await res.json();

    if (result.success) {

  showMessage("Withdrawal request submitted");

  setTimeout(() => {
    window.location.href = "mine.html";
  }, 3000);

    } else {
      showMessage(result.msg || "Withdrawal failed");
      okBtn.disabled = false;
      okBtn.innerText = "OK";
    }

  } catch (err) {
    showMessage("Server error");
    okBtn.disabled = false;
    okBtn.innerText = "OK";
  }
});

window.addEventListener("pagehide", () => {
  sessionStorage.removeItem("withdrawAccess");
});
</script>

</body>
</html>
