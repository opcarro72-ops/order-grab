<!DOCTYPE html>
<html>
<head>
  <title>Withdrawal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="withdraw.css">
</head>

<body>

<div class="withdraw-page">

  <div class="withdraw-header">
    <span class="back" onclick="history.back()">❮</span>
    <h2>Withdrawal</h2>
  </div>

  <div class="withdraw-container">

    <div class="currency-box">
      💳
      <p>virtual<br>currency</p>
    </div>

    <div class="section-title">Wallet</div>

    <div class="wallet-row">
      <span id="walletName">No wallet added</span>
      <span class="check">✔</span>
    </div>

    <div class="amount-box">
      <div class="amount-header">
        <span>USDT</span>
        <span class="max">Maximum amount</span>
      </div>

      <input type="number" id="amount" placeholder="">

    </div>

    <button id="okBtn" class="ok-btn" disabled>OK</button>

  </div>
</div>

<script>
const amountInput = document.getElementById("amount");
const okBtn = document.getElementById("okBtn");

let user = localStorage.getItem("username");
let walletData = JSON.parse(localStorage.getItem("walletData_" + user));

if(walletData){
  document.getElementById("walletName").innerText =
    walletData.name + "(" + walletData.protocol + ")";
}

amountInput.addEventListener("input", () => {
  let amount = parseFloat(amountInput.value) || 0;

  if (amount >= 10) {
    okBtn.disabled = false;
    okBtn.classList.add("active");
  } else {
    okBtn.disabled = true;
    okBtn.classList.remove("active");
  }
});

okBtn.addEventListener("click", async () => {
  let amount = parseFloat(amountInput.value);

  if (!walletData) {
    alert("Please add wallet first");
    return;
  }

  if (amount < 10) {
    alert("Minimum withdrawal is 10 USDT");
    return;
  }

  okBtn.disabled = true;
  okBtn.innerText = "Processing...";

  const token = localStorage.getItem("token");

  try {
    const res = await fetch("/withdraw", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({ amount })
    });

    const result = await res.json();

    if (result.success) {
      alert("Withdrawal request submitted");
      window.location.href = "mine.html";
    } else {
      alert(result.msg || "Withdrawal failed");
      okBtn.disabled = false;
      okBtn.innerText = "OK";
    }

  } catch (err) {
    alert("Server error");
    okBtn.disabled = false;
    okBtn.innerText = "OK";
  }
});
</script>

</body>
</html>
