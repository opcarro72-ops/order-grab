<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Admin Dashboard</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

<style>
:root{
  color-scheme: light dark;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  color:#111;
}

.container{
  width:95%;
  max-width:1200px;
  margin:20px auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:20px;
}

.logout-btn{
  width:auto;
  padding:8px 16px;
  background:#ff0000;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}

.bottom-logout{
    width:100%;
    padding:14px;
    margin-top:10px;
    font-size:16px;
}

.header-right{
  display:flex;
  justify-content:flex-end;
  align-items:center;
}

.menu{
  display:flex;
  gap:30px;
  align-items:center;
}

.menu-item{
  font-size:30px;
  font-weight:bold;
  cursor:pointer;
  color:#111;
}

.menu-item:hover{
  color:#ffc107;
}

.menu-item.active{
  color:#ffc107;
  border-bottom:3px solid #ffc107;
  padding-bottom:5px;
}

.card{
  background:#ffffff;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card h2{
  color:#ffc107;
}

select,
input,
button,
textarea{
  padding:10px;
  margin-top:10px;
  border:1px solid #ddd;
  border-radius:6px;
  width:100%;
  box-sizing:border-box;
  font-size:16px;
}

button{
  cursor:pointer;
}

.blue-btn{
  background:#007bff;
  color:#fff;
  border:none;
}

.green-btn{
  background:green;
  color:#fff;
  border:none;
}

.admin-item{
  background:#f1f1f1;
  padding:15px;
  margin:10px 0;
  border-radius:8px;
}

.wallet-info{
  background:#f1f1f1;
  padding:15px;
  border-radius:8px;
  margin-bottom:10px;
  line-height:30px;
}

.status-box p{
  margin:5px 0;
}

label{
  display:block;
  margin-top:12px;
  color:#444;
}

.custom-message{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  color:#111;
  padding:14px 24px;
  border-radius:10px;
  display:none;
  z-index:9999;
  box-shadow:0 4px 15px rgba(0,0,0,.3);
  animation:fadeIn .3s ease;
}

.message-box p{
  margin:0;
  font-size:14px;
}

.confirm-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.confirm-box{
  width:320px;
  background:#fff;
  color:#111;
  padding:25px;
  border-radius:12px;
  text-align:center;
}

.confirm-box p{
  margin-bottom:20px;
  font-size:15px;
}

.confirm-buttons{
  display:flex;
  gap:10px;
}

.confirm-buttons button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:#fff;
}

.yes-btn{
  background:#28a745;
}

.no-btn{
  background:#dc3545;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateX(-50%) translateY(-10px);
  }

  to{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
}

@media (prefers-color-scheme: dark){

  body{
    background:#0b0f14;
    color:#fff;
  }

  .menu-item{
    color:#fff;
  }

  .card{
    background:#141a20;
    box-shadow:none;
  }

  .admin-item{
    background:#1a1f27;
}

  label{
    color:#ddd;
  }

  select,
  input,
  textarea{
    background:#1a1f27;
    color:#fff;
    border:1px solid #333;
  }

  .custom-message{
    background:#111;
    color:#fff;
  }

  .confirm-box{
    background:#141a20;
    color:#fff;
  }

  .wallet-info{
    background:#1a1f27;
    color:#fff;
}

}

.ts-wrapper{
    width:100%;
}

.ts-control{
    background:#fff !important;
    color:#111 !important;
    border:1px solid #ddd !important;
    min-height:44px;
    font-size:16px;
}

.ts-control input{
    color:#111 !important;
}

.ts-control .item{
    color:#111 !important;
    background:transparent !important;
}

.ts-dropdown{
    background:#fff !important;
}

.ts-dropdown .option{
    color:#111 !important;
}

@media(prefers-color-scheme:dark){

.ts-control{
    background:#1a1f27 !important;
    color:#fff !important;
    border:1px solid #333 !important;
}

.ts-control input{
    color:#fff !important;
}

.ts-control .item{
    color:#fff !important;
    background:transparent !important;
}

.ts-dropdown{
    background:#1a1f27 !important;
    border:1px solid #333 !important;
}

.ts-dropdown .option{
    color:#fff !important;
}

.ts-dropdown .active{
    background:#0d6efd !important;
    color:#fff !important;
}

}

</style>
</head>
<body>

<div class="container">

  <div class="header">

    <div class="menu">

        <span class="menu-item active"
              id="dashboardTab"
              onclick="showDashboard()">
            Admin Dashboard
        </span>

        <span class="menu-item"
              id="fundTab"
              onclick="showFunds()">
            Funds Management
        </span>

    </div>

</div>

  <div id="dashboardSection">
  <div class="card">
    <h2>User Control Panel</h2>

    <select id="userSelect" onchange="loadUserStatus()">
      <option value="">Select User</option>
    </select>

    <label>How many mixed orders? (1-5)</label>
    <input type="number" id="mixedCount" placeholder="Example: 3">

    <label>Mixed order positions</label>
    <input type="text" id="mixedPositions" placeholder="Example: 7,19,23">

    <label>Mixed order percentage by position</label>
    <textarea id="mixedPositionPercent" rows="5" placeholder="Example:
7:30-40
19:50-70
23:100-120"></textarea>

    <button class="blue-btn" onclick="giveTasks()">Give 25 Tasks</button>

    <label>Enter new balance</label>
    <input type="number" id="newBalance" placeholder="Enter new balance">

    <button class="green-btn" onclick="updateBalance()">Update Balance</button>

    <div class="status-box" id="userStatus" style="margin-top:20px;">
      <p>Today's Tasks: 0</p>
      <p>Task Limit: 0</p>
      <p>Today's Commission: 0 USDT</p>
      <p>Yesterday's Commission: 0 USDT</p>
      <p>Balance: 0 USDT</p>
      <p>Mixed Positions: None</p>
    </div>

    <div style="margin-top:25px;">

  <h3 style="color:#ffc107;">Reset User Login Password</h3>

  <input type="text" id="newUserPassword" placeholder="Enter new password">

  <button class="blue-btn" onclick="resetUserPassword()">
    Reset Login Password
  </button>

</div>

<div style="margin-top:25px;">

    <h3 style="color:#ffc107;">User Wallet Information</h3>

    <div id="walletInfo" class="wallet-info">
        No wallet information
    </div>

    <button class="green-btn" onclick="resetWallet()">
        Reset Wallet Information
    </button>

</div>

</div>

<div class="card">

    <button class="logout-btn bottom-logout"
            onclick="logout()">
        Logout
    </button>

</div>

</div>

<div id="fundSection" style="display:none;">

    <div class="card">
        <h2>Pending Deposits</h2>
        <div id="depositList"></div>
    </div>

    <div class="card">
        <h2>Pending Withdraws</h2>
        <div id="withdrawList"></div>
    </div>

</div>

</div>

<div id="customMessage" class="custom-message">
  <div class="message-box">
    <p id="messageText"></p>
  </div>
</div>

<div id="customConfirm" class="confirm-overlay">

  <div class="confirm-box">

    <p id="confirmText"></p>

    <div class="confirm-buttons">
      <button class="yes-btn" id="confirmYes">Yes</button>
      <button class="no-btn" id="confirmNo">No</button>
    </div>

  </div>

</div>

<script>

function showDashboard(){

    document.getElementById("dashboardSection").style.display="block";

    document.getElementById("fundSection").style.display="none";

    document.getElementById("dashboardTab").classList.add("active");

    document.getElementById("fundTab").classList.remove("active");

}

function showFunds(){

    document.getElementById("dashboardSection").style.display="none";

    document.getElementById("fundSection").style.display="block";

    document.getElementById("fundTab").classList.add("active");

    document.getElementById("dashboardTab").classList.remove("active");

}

showDashboard();

</script>

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<script src="admin.js"></script>
</body>
</html>
