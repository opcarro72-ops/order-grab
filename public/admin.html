<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b0f14;
  color:#fff;
}
.container{
  width:95%;
  max-width:1200px;
  margin:20px auto;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.logout-btn{
  padding:10px 18px;
  background:red;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.card{
  background:#141a20;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}
.card h2{
  color:#ffc107;
}
select,input,button,textarea{
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  width:100%;
  box-sizing:border-box;
}
button{
  cursor:pointer;
}
.blue-btn{
  background:#007bff;
  color:#fff;
}
.green-btn{
  background:green;
  color:#fff;
}
.item{
  background:#1a1f27;
  padding:15px;
  margin:10px 0;
  border-radius:8px;
}
.status-box p{
  margin:5px 0;
}
label{
  display:block;
  margin-top:12px;
  color:#ddd;
}

.custom-message{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#fff;
  padding:14px 24px;
  border-radius:10px;
  display:none;
  z-index:9999;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
  animation:fadeIn .3s ease;
}

.message-box p{
  margin:0;
  font-size:14px;
}

.confirm-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:99999;
}

.confirm-box{
  width:320px;
  background:#141a20;
  padding:25px;
  border-radius:12px;
  text-align:center;
}

.confirm-box p{
  margin-bottom:20px;
  font-size:15px;
}

.confirm-buttons{
  display:flex;
  gap:10px;
}

.confirm-buttons button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  color:#fff;
}

.yes-btn{
  background:#28a745;
}

.no-btn{
  background:#dc3545;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateX(-50%) translateY(-10px);
  }

  to{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
}

</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Admin Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h2>User Control Panel</h2>

    <select id="userSelect" onchange="loadUserStatus()">
      <option value="">Select User</option>
    </select>

    <label>How many mixed orders? (1-5)</label>
    <input type="number" id="mixedCount" placeholder="Example: 3">

    <label>Mixed order positions</label>
    <input type="text" id="mixedPositions" placeholder="Example: 7,19,23">

    <label>Mixed order percentage by position</label>
    <textarea id="mixedPositionPercent" rows="5" placeholder="Example:
7:30-40
19:50-70
23:100-120"></textarea>

    <button class="blue-btn" onclick="giveTasks()">Give 25 Tasks</button>

    <label>Enter new balance</label>
    <input type="number" id="newBalance" placeholder="Enter new balance">

    <button class="green-btn" onclick="updateBalance()">Update Balance</button>

    <div class="status-box" id="userStatus" style="margin-top:20px;">
      <p>Today's Tasks: 0</p>
      <p>Task Limit: 0</p>
      <p>Today's Commission: 0 USDT</p>
      <p>Yesterday's Commission: 0 USDT</p>
      <p>Balance: 0 USDT</p>
      <p>Mixed Positions: None</p>
    </div>

    <div style="margin-top:25px;">

  <h3 style="color:#ffc107;">Reset User Login Password</h3>

  <input type="text" id="newUserPassword" placeholder="Enter new password">

  <button class="blue-btn" onclick="resetUserPassword()">
    Reset Login Password
  </button>

</div>

<div style="margin-top:25px;">

  <h3 style="color:#ffc107;">User Wallet Information</h3>

  <div id="walletInfo" style="
    background:#1a1f27;
    padding:15px;
    border-radius:8px;
    margin-bottom:10px;
    line-height:30px;
  ">

    No wallet information

  </div>

  <button class="green-btn" onclick="resetWallet()">
    Reset Wallet Information
  </button>

</div>
  </div>

  <div class="card">
    <h2>Pending Deposits</h2>
    <div id="depositList"></div>
  </div>

  <div class="card">
    <h2>Pending Withdraws</h2>
    <div id="withdrawList"></div>
  </div>

</div>

<div id="customMessage" class="custom-message">
  <div class="message-box">
    <p id="messageText"></p>
  </div>
</div>

<div id="customConfirm" class="confirm-overlay">

  <div class="confirm-box">

    <p id="confirmText"></p>

    <div class="confirm-buttons">
      <button class="yes-btn" id="confirmYes">Yes</button>
      <button class="no-btn" id="confirmNo">No</button>
    </div>

  </div>

</div>

<script>
if ("serviceWorker" in navigator) {

  navigator.serviceWorker
    .register("/service-worker.js")

    .then(() => {
      console.log("Service Worker Registered");
    });

}
</script>

<script src="admin.js"></script>
</body>
</html>
