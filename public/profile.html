<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="logo.png">

  <style>
    body{
      margin:0;
      background:#f2f2f2;
      font-family:Arial, sans-serif;
    }

    .header{
      position: relative;
      height: 55px;
      background: #fff;
      border-bottom: 1px solid #eee;
    }

    .header h2{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .back{
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      cursor:pointer;
    }

    .container{
      padding:0;
    }

    .card{
      width:calc(100% - 15px);
      margin-left:0;
      margin-right:15px;

      background:#fff;
      padding:15px;
      margin-bottom:12px;

      border-radius:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.06);

      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .card span{
      font-size:14px;
      color:#333;
    }

    .avatar{
      width:55px;
      height:55px;
      border-radius:50%;
      object-fit:cover;
      cursor:pointer;
      border:2px solid #ddd;
    }

    #fileInput{
      display:none;
    }

    @media (min-width:768px){

      .container{
        padding:0;
      }

      .card{
        width:calc(100% - 30px);
        margin-right:30px;
      }
    }

    .custom-msg{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:12px 20px;
  border-radius:8px;
  display:none;
  z-index:9999;
  animation:fadeIn 0.3s ease;
}

.msg-box p{
  margin:0;
  font-size:14px;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateX(-50%) translateY(-10px);
  }
  to{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
}

  </style>
</head>

<body>

<div class="header">
  <span class="back" onclick="window.location.href='mine.html'">❮</span>
  <h2>Profile</h2>
</div>

<div class="container">

  <div class="card">
    <span>Personal Avatar</span>
    <img id="avatarPreview" class="avatar" src="default.png">
  </div>

</div>

<div id="customMsg" class="custom-msg">
  <div class="msg-box">
    <p id="msgText"></p>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*">

<script>
const avatar = document.getElementById("avatarPreview");
const fileInput = document.getElementById("fileInput");

const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "login.html";
}

function showMessage(message){

  const msg = document.getElementById("customMsg");
  const text = document.getElementById("msgText");

  text.innerText = message;

  msg.style.display = "block";

  setTimeout(() => {
    msg.style.display = "none";
  }, 3000);
}

async function loadProfileImage() {

  try {

    const res = await fetch("/get-profile-image", {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    const data = await res.json();

    if (data.success && data.image) {
      avatar.src = data.image;
    } else {
      avatar.src = "default.png";
    }

  } catch (err) {

    avatar.src = "default.png";
  }
}

loadProfileImage();

avatar.addEventListener("click", () => {
  fileInput.click();
});

fileInput.addEventListener("change", function(){
  const file = this.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = async function(e){

  const imageData = e.target.result;

  try {

    const res = await fetch("/save-profile-image", {
      method: "POST",

      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token
      },

      body: JSON.stringify({
        image: imageData
      })
    });

    const data = await res.json();

    if (data.success) {

      avatar.src = imageData;

      showMessage("Profile image updated successfully");

    } else {

      showMessage(data.msg);
    }

  } catch (err) {

    console.log(err);

    showMessage("Server error: " + err.message);
  }
};

  reader.readAsDataURL(file);
});
</script>

</body>
</html>
