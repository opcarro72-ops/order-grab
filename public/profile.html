<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      background:#f2f2f2;
      font-family:Arial, sans-serif;
    }

    .header{
      position: relative;
      height: 55px;
      background: #fff;
      border-bottom: 1px solid #eee;
    }

    .header h2{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .back{
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      cursor:pointer;
    }

    .container{
      padding:0;
    }

    .card{
      width:calc(100% - 15px);
      margin-left:0;
      margin-right:15px;

      background:#fff;
      padding:15px;
      margin-bottom:12px;

      border-radius:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.06);

      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .card span{
      font-size:14px;
      color:#333;
    }

    .avatar{
      width:55px;
      height:55px;
      border-radius:50%;
      object-fit:cover;
      cursor:pointer;
      border:2px solid #ddd;
    }

    #fileInput{
      display:none;
    }

    @media (min-width:768px){

      .container{
        padding:0;
      }

      .card{
        width:calc(100% - 30px);
        margin-right:30px;
      }
    }

  </style>
</head>

<body>

<div class="header">
  <span class="back" onclick="window.location.href='mine.html'">❮</span>
  <h2>Profile</h2>
</div>

<div class="container">

  <div class="card">
    <span>Personal Avatar</span>
    <img id="avatarPreview" class="avatar" src="default.png">
  </div>

</div>

<input type="file" id="fileInput" accept="image/*">

<script>
const avatar = document.getElementById("avatarPreview");
const fileInput = document.getElementById("fileInput");

let user = localStorage.getItem("username");

let savedImage = localStorage.getItem("userProfileImage_" + user);

if(savedImage){
  avatar.src = savedImage;
}else{
  avatar.src = "default.png";
}

avatar.addEventListener("click", () => {
  fileInput.click();
});

fileInput.addEventListener("change", function(){
  const file = this.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    const imageData = e.target.result;

    localStorage.setItem("userProfileImage_" + user, imageData);
    avatar.src = imageData;

    alert("Profile image updated successfully");
  };

  reader.readAsDataURL(file);
});
</script>

</body>
</html>
