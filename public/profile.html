<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f2f2f2;
    }

    /* HEADER */
    .header{
      position: relative;
      height: 55px;
      background: #fff;
      border-bottom: 1px solid #eee;
    }

    .header h2{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .back{
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 22px;
      cursor:pointer;
    }

    /* CONTAINER */
    .container{
      padding: 12px;
    }

    /* CARD */
    .card{
      background:#fff;
      border-radius:12px;
      padding:15px;
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .card span{
      font-size:16px;
      color:#333;
    }

    .avatar{
      width:55px;
      height:55px;
      border-radius:50%;
      object-fit:cover;
      cursor:pointer;
      border:2px solid #ddd;
    }

    #fileInput{
      display:none;
    }

    /* DESKTOP */
    @media (min-width:768px){

      .container{
        padding:20px 40px;
      }

      .card{
        width:100%;
        max-width:none; /* full width */
      }
    }

  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <span class="back" onclick="window.location.href='mine.html'">❮</span>
  <h2>Profile</h2>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="card">
    <span>Personal Avatar</span>
    <img id="avatarPreview" class="avatar" src="default.png">
  </div>

</div>

<input type="file" id="fileInput" accept="image/*">

<script>
const avatar = document.getElementById("avatarPreview");
const fileInput = document.getElementById("fileInput");

// current user
let user = localStorage.getItem("username");

// load saved image
let savedImage = localStorage.getItem("userProfileImage_" + user);

if(savedImage){
  avatar.src = savedImage;
}else{
  avatar.src = "default.png";
}

// click avatar
avatar.addEventListener("click", () => {
  fileInput.click();
});

// save image
fileInput.addEventListener("change", function(){
  const file = this.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    const imageData = e.target.result;

    localStorage.setItem("userProfileImage_" + user, imageData);
    avatar.src = imageData;

    alert("Profile image updated successfully");
  };

  reader.readAsDataURL(file);
});
</script>

</body>
</html>
