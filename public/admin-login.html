<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0b0f14,#111827);
  color:white;
}
.login-box{
  width:380px;
  background:#141a20;
  padding:35px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.35);
}
.login-box h2{
  text-align:center;
  margin-bottom:25px;
  color:#ffc107;
}
.input-group{
  margin-bottom:18px;
}
.input-group label{
  display:block;
  margin-bottom:6px;
  font-size:14px;
  color:#ccc;
}
.input-group input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  outline:none;
  background:#1f2937;
  color:white;
  font-size:15px;
}
.login-btn{
  width:100%;
  padding:12px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
}
.login-btn:hover{
  background:#0062cc;
}
.error{
  margin-top:15px;
  color:#ff4d4d;
  text-align:center;
  font-size:14px;
}
</style>
</head>
<body>

<div class="login-box">
  <h2>Admin Login</h2>

  <div class="input-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter admin username">
  </div>

  <div class="input-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password">
  </div>

  <button class="login-btn" onclick="adminLogin()">Login</button>

  <div class="error" id="errorMsg"></div>
</div>

<script src="admin-login.js"></script>
</body>
</html>
