<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="menu-page">

<div class="main-body">

  <h2 class="page-title">Menu</h2>

  <div class="menu-wrapper">

    <div class="tabs">
      <button class="tab active" onclick="filterCards('all', this)">All</button>
      <button class="tab" onclick="filterCards('vip1', this)">VIP 1</button>
      <button class="tab" onclick="filterCards('vip2', this)">VIP 2</button>
      <button class="tab" onclick="filterCards('vip3', this)">VIP 3</button>
    </div>

    <div class="menu-card" data-vip="vip1" onclick="goPage('amazon.html')">
      <div class="vip-badge">VIP 1</div>
      <img src="/amazon.png" class="logo">
      <div class="info">
        <h3>Amazon</h3>
        <p>Available balance: 20USDT - 498USDT</p>
        <p>
  <span class="commission-label">Commissions:</span>
  <span class="commission-value">4%</span>
</p>
      </div>
    </div>

    <div class="menu-card" data-vip="vip2" onclick="goPage('alibaba.html')">
      <div class="vip-badge">VIP 2</div>
      <img src="/alibaba.png" class="logo">
      <div class="info">
        <h3>Alibaba</h3>
        <p>Available balance: 499USDT - 899USDT</p>
        <p>
  <span class="commission-label">Commissions:</span>
  <span class="commission-value">8%</span>
</p>
      </div>
    </div>

    <div class="menu-card" data-vip="vip3" onclick="goPage('aliexpress.html')">
      <div class="vip-badge">VIP 3</div>
      <img src="/aliexpress.png" class="logo">
      <div class="info">
        <h3>AliExpress</h3>
        <p>Available balance: 899+ USDT</p>
        <p>
  <span class="commission-label">Commissions:</span>
  <span class="commission-value">12%</span>
</p>
      </div>
    </div>

    <div class="no-more">No more</div>

  </div>

</div>

<div class="bottom-nav">
  <div class="nav-item" data-page="home.html" onclick="goPage('home.html')">
    <span>🏠</span>
    <div>Home</div>
  </div>

  <div class="nav-item" data-page="service.html" onclick="goPage('service.html')">
    <span>🎧</span>
    <div>Service</div>
  </div>

  <div class="nav-item active" data-page="menu.html">
    <span>👜</span>
    <div>Menu</div>
  </div>

  <div class="nav-item" data-page="record.html" onclick="goPage('record.html')">
    <span>📄</span>
    <div>Record</div>
  </div>

  <div class="nav-item" data-page="mine.html" onclick="goPage('mine.html')">
    <span>👤</span>
    <div>Mine</div>
  </div>
</div>

<script>
function goPage(page) {
  window.location.href = page;
}

// Active nav highlight (same as home/service)
const currentPage = window.location.pathname.split("/").pop();
document.querySelectorAll(".nav-item").forEach(item => {
  if (item.getAttribute("data-page") === currentPage) {
    item.classList.add("active");
  }
});

function filterCards(type, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");

  document.querySelectorAll(".menu-card").forEach(card => {
    if (type === "all" || card.dataset.vip === type) {
      card.style.display = "flex";
    } else {
      card.style.display = "none";
    }
  });
}
</script>

</body>
</html>
