<!DOCTYPE html>
<html>
<head>
  <title>Wallet Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
  margin:0;
  background:#f5f5f5;
  font-family: Arial, sans-serif;
}

.header {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  height: 55px;
  background: #ffffff;
  border-bottom: 1px solid #eee;
}

.header h2 {
  font-size: 18px;
  font-weight: 600;
  margin: 0;
}

.back {
  position: absolute;
  left: 15px;
  font-size: 20px;
  cursor: pointer;
}

.container {
  padding: 12px;
}

.card {
  background: #ffffff;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 12px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 14px;
}

.password-box {
  position: relative;
}

.password-box span {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  margin-top: 10px;
}

#okBtn {
  background: #ddd;
  color: #999;
}

#okBtn.active {
  background: #16a34a;
  color: white;
}

#cancelBtn {
  background: #fff;
  border: 1px solid #ddd;
  color: #333;
}

  </style>
</head>

<body>

<script>
let user = localStorage.getItem("username");

if (localStorage.getItem("walletLocked_" + user) === "true") {
  window.location.href = "wallet-view.html";
}
</script>

<div class="wrapper">

  <div class="header">
    <span class="back" onclick="history.back()">❮</span>
    <h2>Virtual Currency</h2>
  </div>

  <div class="container">

    <div class="card">
      <input id="name" placeholder="Wallet name" autocomplete="off">
      <input id="protocol" placeholder="Virtual currency protocol" autocomplete="off">
      <input id="address" placeholder="Wallet address" autocomplete="off">

      <div class="password-box">
        <input id="password" placeholder="Withdrawal password" type="password" autocomplete="new-password">
        <span onclick="togglePassword()">👁️</span>
      </div>
    </div>

    <button id="okBtn" class="btn" disabled>OK</button>
    <button id="cancelBtn" class="btn">Cancel</button>

  </div>

</div>


<script>
const nameInput = document.getElementById("name");
const protocolInput = document.getElementById("protocol");
const addressInput = document.getElementById("address");
const passwordInput = document.getElementById("password");

const inputs = [nameInput, protocolInput, addressInput, passwordInput];

const okBtn = document.getElementById("okBtn");
const cancelBtn = document.getElementById("cancelBtn");

inputs.forEach(input => {
  input.addEventListener("input", () => {
    let filled = inputs.every(i => i.value.trim() !== "");
    
    if (filled) {
      okBtn.disabled = false;
      okBtn.classList.add("active");
    } else {
      okBtn.disabled = true;
      okBtn.classList.remove("active");
    }
  });
});

okBtn.addEventListener("click", () => {
  let data = {
    name: nameInput.value,
    protocol: protocolInput.value,
    address: addressInput.value,
    password: passwordInput.value
  };

  let user = localStorage.getItem("username");

  localStorage.setItem("walletData_" + user, JSON.stringify(data));
  localStorage.setItem("walletLocked_" + user, "true");

  window.location.href = "wallet-view.html";
});

cancelBtn.addEventListener("click", () => {
  window.history.back();
});

function togglePassword() {
  if (passwordInput.type === "password") {
    passwordInput.type = "text";
  } else {
    passwordInput.type = "password";
  }
}
</script>

</body>
</html>
