<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Record</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f2f2f2;
  color:#333;
}

h2{
  margin:0;
  padding:15px;
  background:#fff;
  border-bottom:1px solid #ddd;
}

.popup-overlay {
  position: static !important;
  width: 100% !important;
  height: auto !important;
  display: block !important;
  background: none !important;
}

html {
  overflow-y: scroll;
}

.order-popup {
  max-width: 420px;
  width: 100%;
  margin: 20px auto;
  max-height: 70vh;
  overflow-y: auto;
  border-radius: 15px;
}

.header{
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

.tabs{
  display:flex;
  justify-content:space-around;
  background:#fff;
  border-bottom:1px solid #ddd;
}

.tab{
  padding:12px;
  cursor:pointer;
  color:#190808;
}

.tab.active{
  color:#000000;
  border-bottom:3px solid #159c29;
}

.content{
  padding:15px;
  padding-bottom:80px;
}

.empty{
  text-align:center;
  color:#aaa;
  margin-top:40px;
}

</style>

</head>

<body>

  <h2 style="text-align:center;">Record</h2>

<div class="tabs">
  <div class="tab active" id="tabIncomplete" onclick="switchTab('incomplete')">Incomplete</div>
  <div class="tab" id="tabComplete" onclick="switchTab('complete')">Complete</div>
</div>

<div class="content">
  <div id="incompleteTab"></div>
  <div id="completeTab" style="display:none;"></div>
</div>

<div class="bottom-nav">

  <div class="nav-item" data-page="home.html" onclick="goPage('home.html')">
    <span>🏠</span>
    <div>Home</div>
  </div>

  <div class="nav-item" data-page="service.html" onclick="goPage('service.html')">
    <span>🎧</span>
    <div>Service</div>
  </div>

  <div class="nav-item" data-page="menu.html" onclick="goPage('menu.html')">
    <span>👜</span>
    <div>Menu</div>
  </div>

  <div class="nav-item" data-page="record.html" onclick="goPage('record.html')">
    <span>📄</span>
    <div>Record</div>
  </div>

  <div class="nav-item" data-page="mine.html" onclick="goPage('mine.html')">
    <span>👤</span>
    <div>Mine</div>
  </div>

</div>

<script src="script.js"></script>

<script>

function goPage(page){
  window.location.href = page;
}

function goRecord(){
  window.location.href = "record.html";
}

function switchTab(tab){

  document.getElementById("incompleteTab").style.display =
    tab === "incomplete" ? "block" : "none";

  document.getElementById("completeTab").style.display =
    tab === "complete" ? "block" : "none";

  document.getElementById("tabIncomplete").classList.toggle("active", tab==="incomplete");
  document.getElementById("tabComplete").classList.toggle("active", tab==="complete");
}

switchTab("incomplete");
renderOrders();

</script>

</body>
</html>
