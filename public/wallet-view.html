<!DOCTYPE html>
<html>
<head>
  <title>Wallet View</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0b0f14">

<link rel="apple-touch-icon" href="logo.png">

  <style>
    body {
      margin:0;
      background:#f5f5f5;
      font-family: Arial, sans-serif;
    }

    .header {
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      height:55px;
      background:#fff;
      border-bottom:1px solid #eee;
    }

    .header h2 {
      font-size:18px;
      font-weight:600;
      margin:0;
    }

    .back {
      position:absolute;
      left:15px;
      font-size:20px;
      cursor:pointer;
    }

    .container {
      padding:12px;
    }

    .card {
      background: linear-gradient(90deg,#34d318,#1eae68);
      padding:20px;
      border-radius:12px;
      color:#fff;
    }

    h3 {
      margin:0 0 10px;
    }

    p {
      margin:5px 0;
      opacity:0.9;
      word-break: break-all;
    }

    @media (min-width: 768px) {
      .container {
        padding:20px 60px;
      }
    }

  </style>
</head>

<body>

<div class="header">
  <span class="back" onclick="goBack()">❮</span>
  <h2>Wallet Management</h2>
</div>

<div class="container">

  <div class="card">
    <h3 id="walletName"></h3>
    <p id="walletProtocol"></p>
    <p id="walletAddress"></p>
  </div>

</div>

<script>

const token = localStorage.getItem("token");

async function loadWallet() {

  try {

    const res = await fetch("/get-wallet", {

      headers: {
        Authorization: "Bearer " + token
      }
    });

    const data = await res.json();

    if (
      data.success &&
      data.wallet &&
      data.wallet.locked
    ) {

      document.getElementById("walletName").innerText =
        data.wallet.name || "";

      document.getElementById("walletProtocol").innerText =
        data.wallet.protocol || "";

      document.getElementById("walletAddress").innerText =
        data.wallet.address || "";

    } else {

      window.location.replace("wallet.html");
    }

  } catch (err) {

    console.log(err);

    window.location.replace("wallet.html");
  }
}

loadWallet();

function goBack() {
  window.location.href = "mine.html";
}

</script>

<script>
if ("serviceWorker" in navigator) {

  navigator.serviceWorker
    .register("/service-worker.js")

    .then(() => {
      console.log("Service Worker Registered");
    });

}
</script>

</body>
</html>
