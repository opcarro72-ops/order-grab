<!DOCTYPE html>
<html>
<head>
  <title>Deposit</title>
  <link rel="stylesheet" href="deposit.css">
</head>
<body>

<div class="deposit-header">
  <span class="back-btn" onclick="goBack()">❮</span>
  <h2>Deposit</h2>
</div>

<div class="deposit-container">

  <div class="card">
    <p class="label">Payment method</p>
    <div class="option-box active">USDT</div>
  </div>

  <div class="card">
    <p class="label">Select the protocol to use</p>
    <div class="option-box active">TRC-20</div>
  </div>

  <div class="card">
    <p class="label">Currency selection</p>
    <div class="option-box active">ALL</div>
  </div>

  <div class="card">
    <p class="label">Deposit amount</p>
    <input type="number" id="amountInput" placeholder="Enter amount">
    <p class="hint">Deposit amount must be greater than 0.1 USDT</p>
  </div>

  <div class="estimate">
    Estimated payment: <span id="showAmount">0</span> USDT
  </div>

</div>

<div class="bottom-fixed">
  <button id="depositBtn" disabled onclick="goNext()">Deposit now</button>
</div>

<script>
const amountInput = document.getElementById("amountInput");
const depositBtn = document.getElementById("depositBtn");
const showAmount = document.getElementById("showAmount");

amountInput.addEventListener("input", () => {
  let amount = parseFloat(amountInput.value) || 0;

  showAmount.innerText = amount;

  if (amount >= 0.1) {
    depositBtn.disabled = false;
    depositBtn.classList.add("active");
  } else {
    depositBtn.disabled = true;
    depositBtn.classList.remove("active");
  }
});

async function goNext() {
  let amount = parseFloat(amountInput.value) || 0;
  const token = localStorage.getItem("token");

  if (amount < 0.1) return;

  const res = await fetch("/deposit-request", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ amount })
  });

  const data = await res.json();

  if (data.pending) {
    localStorage.setItem("depositAmount", data.amount);
    localStorage.setItem("depositWarning", data.msg);
    window.location.href = "payment.html";
    return;
  }

  if (data.success) {
    localStorage.setItem("depositAmount", amount);
    localStorage.removeItem("depositWarning");
    window.location.href = "payment.html";
  } else {
    alert(data.msg);
  }
}

function goBack() {
  window.history.back();
}
</script>

</body>
</html>
