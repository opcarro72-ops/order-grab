<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f5f5f5;
    }

    .container{
      padding:20px;
      max-width:920px;
      margin:auto;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top:10px;
    }

    .lang{
  border:1px solid #ddd;
  padding:6px 10px;
  border-radius:8px;
  font-size:14px;
  background:#fff;
  cursor:pointer;
}

    h1{
      margin-top:40px;
      font-size:22px;
      color:#555;
    }

    h2{
      margin-top:10px;
      font-size:26px;
      color:#333;
    }

    .input-box{
      background:#fff;
      border:1px solid #ddd;
      border-radius:10px;
      padding:12px;
      margin-top:15px;
      display:flex;
      align-items:center;
    }

    .input-box input{
      border:none;
      outline:none;
      width:100%;
      font-size:16px;
      background:transparent;
    }

    .remember{
      margin-top:15px;
      font-size:14px;
      color:#444;
    }

    .login-btn{
      margin-top:20px;
      width:100%;
      padding:14px;
      background:#32a50f;
      color:white;
      border:none;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
    }

    .register{
      text-align:right;
      margin-top:15px;
      color:#c90a0a;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="top">
  <div></div>

  <select class="lang" onchange="changeLang(this.value)">
    <option value="en">US</option>
    <option value="bn">বাংলা</option>
  </select>

</div>

  <h1>Hello,Welcome!</h1>
  <h2>Login</h2>

  <div class="input-box">
    <input id="username" placeholder="6-16 letters or numbers">
  </div>

  <div class="input-box">
    <input id="password" type="text" placeholder="6-16 alphanumeric password">
  </div>

  <div class="remember">
    <input type="checkbox" checked> Remember password
  </div>

  <button class="login-btn" onclick="login()">Login</button>

  <div class="register" onclick="goRegister()">Registration</div>

</div>

<script src="login.js"></script>

</body>
</html>
