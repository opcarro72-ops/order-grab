<!DOCTYPE html>
<html>
<head>
  <title>Withdraw Records</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      background:#f2f2f2;
      font-family:Arial, sans-serif;
    }

    .header{
      position: relative;
      height: 55px;
      background: #fff;
      border-bottom: 1px solid #eee;
      width:100%;
    }

    .header h2{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .back{
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      cursor:pointer;
    }

    .container{
      padding:10px;
    }

    .record-item{
      background:#fff;
      margin-bottom:120px;
      padding:15px;

      border-radius:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.06);

      position:relative;
    }

    .record-item p{
      margin:6px 0;
      color:#333;
      font-size:14px;
    }

    .status{
      position:absolute;
      top:12px;
      right:12px;
      padding:5px 12px;
      border-radius:20px;
      font-size:11px;
      font-weight:bold;
      color:#fff;
    }

    .processing{
      background:#d97706;
    }

    .success{
      background:#16a34a;
    }

    .rejected{
      background:#dc2626;
    }

    .empty{
      text-align:center;
      color:#999;
      margin-top:30px;
    }

    @media (min-width:768px){

      .container{
        padding:20px;
      }

      .record-item{
        max-width:900px;
        margin:0 auto 15px auto;
      }
    }

  </style>
</head>

<body>

<div class="header">
  <span class="back" onclick="history.back()">❮</span>
  <h2>Withdraw Records</h2>
</div>

<div class="container" id="recordList"></div>

<script>
async function loadWithdrawRecords() {
  const token = localStorage.getItem("token");
  const box = document.getElementById("recordList");

  if (!token) {
    box.innerHTML = '<p class="empty">User not logged in</p>';
    return;
  }

  box.innerHTML = '<p class="empty">Loading...</p>';

  try {
    const res = await fetch("/my-withdraws", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const records = await res.json();

    if (!Array.isArray(records) || records.length === 0) {
      box.innerHTML = '<p class="empty">No withdrawal records found</p>';
      return;
    }

    box.innerHTML = "";

    records.forEach(r => {
      let statusClass = "processing";

      if (r.status === "Success") statusClass = "success";
      if (r.status === "Rejected") statusClass = "rejected";

      // যদি approvedAmount থাকে সেটা দেখাবে, না থাকলে amount দেখাবে
      const displayAmount = r.approvedAmount > 0 ? r.approvedAmount : r.amount;

      box.innerHTML += `
        <div class="record-item">
          <div class="status ${statusClass}">${r.status}</div>
          <p>Amount: ${displayAmount} USDT</p>
          <p>Time: ${new Date(r.time).toLocaleString()}</p>
        </div>
      `;
    });

  } catch (error) {
    box.innerHTML = '<p class="empty">Server error loading records</p>';
  }
}

loadWithdrawRecords();
</script>

</body>
</html>
