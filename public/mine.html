<!DOCTYPE html>
<html>
<head>
  <title>Mine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="profile-box">
  <div class="user-info">

    <img id="profileImg" class="avatar">

    <div class="user-text">
      <h3 id="usernameDisplay"></h3>
      <p>Invitation code: 422872</p>
    </div>

  </div>

  <div class="account-row">
    <div>
      <p>My Account</p>
      <h2 id="balance">USDT 0</h2>
    </div>

    <div class="action-icons">
      <div onclick="goPage('deposit.html')">
        💳
        <p>Deposit</p>
      </div>

      <div onclick="checkWithdrawPassword()">
        💳
        <p>Withdrawal</p>
      </div>
    </div>
  </div>
</div>

<div class="menu-grid">
  <div onclick="goPage('team.html')">
    <span>👥</span>Teams
  </div>

  <div onclick="goPage('record.html')">
    <span>📄</span>Record
  </div>

  <div onclick="goPage('wallet.html')">
    <span>💳</span>Wallet management
  </div>

  <div onclick="goPage('invite.html')">
    <span>📩</span>Invite
  </div>
</div>

<div class="menu-list">

  <div class="menu-item" onclick="goPage('profile.html')">
    <span>👤 <span data-lang="profile">Profile</span></span>
    <span>›</span>
  </div>

  <div class="menu-item" onclick="goPage('deposit-record.html')">
    <span>📄 <span data-lang="depositRecords">Deposit records</span></span>
    <span>›</span>
  </div>

  <div class="menu-item" onclick="goPage('withdraw-record.html')">
    <span>💳 <span data-lang="withdrawRecords">Withdrawal records</span></span>
    <span>›</span>
  </div>

  <div class="menu-item" onclick="goPage('setting.html')">
    <span>⚙ <span data-lang="settings">Settings</span></span>
    <span>›</span>
  </div>

</div>

<div class="bottom-nav">

  <div class="nav-item" data-page="home.html" onclick="goPage('home.html')">
    <span>🏠</span>
    <div>Home</div>
  </div>

  <div class="nav-item" data-page="service.html" onclick="goPage('service.html')">
    <span>🎧</span>
    <div>Service</div>
  </div>

  <div class="nav-item" data-page="menu.html" onclick="goPage('menu.html')">
    <span>👜</span>
    <div>Menu</div>
  </div>

  <div class="nav-item" data-page="record.html" onclick="goPage('record.html')">
    <span>📄</span>
    <div>Record</div>
  </div>

  <div class="nav-item" data-page="mine.html" onclick="goPage('mine.html')">
    <span>👤</span>
    <div>Mine</div>
  </div>

</div>

<script src="script.js"></script>

<script>
  let user = localStorage.getItem("username");

const img = document.getElementById("profileImg");
let saved = localStorage.getItem("userProfileImage_" + user);

img.src = saved ? saved : "default.png";

function checkWithdrawPassword() {
  let data = JSON.parse(localStorage.getItem("walletData_" + user));

  if (!data) {
    alert("Please add wallet first!");
    return;
  }

  let inputPass = prompt("Enter withdrawal password:");

  if (inputPass === null) return;

  if (inputPass === data.password) {
    window.location.href = "withdraw.html";
  } else {
    alert("Wrong password!");
  }
}

const lang = localStorage.getItem("siteLanguage") || "en";

const texts = {
  en: {
    profile: "Profile",
    depositRecords: "Deposit records",
    withdrawRecords: "Withdrawal records",
    settings: "Settings"
  },
  bn: {
    profile: "প্রোফাইল",
    depositRecords: "ডিপোজিট রেকর্ড",
    withdrawRecords: "উইথড্র রেকর্ড",
    settings: "সেটিংস"
  }
};

document.querySelectorAll("[data-lang]").forEach(el => {
  const key = el.getAttribute("data-lang");
  if(texts[lang][key]){
    el.innerText = texts[lang][key];
  }
});
</script>

</body>
</html>
